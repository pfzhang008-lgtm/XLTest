<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Brain Outline -->
  <path d="M25,50 C20,45 20,30 35,20 C45,10 65,10 75,25 C85,30 90,45 85,60 C80,75 70,85 50,85 C40,85 30,80 25,70 C15,75 5,65 10,50 Z" 
        fill="none" stroke="url(#grad1)" stroke-width="2" filter="url(#glow)" />
  
  <!-- Internal Connections (Tech Viz) -->
  <circle cx="35" cy="35" r="3" fill="#00F2FF" filter="url(#glow)" />
  <circle cx="65" cy="30" r="3" fill="#00F2FF" filter="url(#glow)" />
  <circle cx="50" cy="55" r="4" fill="#FFFFFF" filter="url(#glow)" />
  <circle cx="70" cy="60" r="2" fill="#00F2FF" filter="url(#glow)" />
  <circle cx="30" cy="65" r="2" fill="#00F2FF" filter="url(#glow)" />
  
  <line x1="35" y1="35" x2="65" y2="30" stroke="#00F2FF" stroke-width="1" opacity="0.6" />
  <line x1="35" y1="35" x2="50" y2="55" stroke="#00F2FF" stroke-width="1" opacity="0.6" />
  <line x1="65" y1="30" x2="50" y2="55" stroke="#00F2FF" stroke-width="1" opacity="0.6" />
  <line x1="50" y1="55" x2="70" y2="60" stroke="#00F2FF" stroke-width="1" opacity="0.6" />
  <line x1="50" y1="55" x2="30" y2="65" stroke="#00F2FF" stroke-width="1" opacity="0.6" />
</svg>