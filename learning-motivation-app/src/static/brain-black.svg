<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="rustGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </defs>
  
  <!-- Brain Silhouette -->
  <path d="M25,50 C20,45 20,30 35,20 C45,10 65,10 75,25 C85,30 90,45 85,60 C80,75 70,85 50,85 C40,85 30,80 25,70 C15,75 5,65 10,50 Z" 
        fill="url(#rustGrad)" stroke="#5D4037" stroke-width="2" />
  
  <!-- Cracks / Rust Effects -->
  <path d="M40,30 L45,40 L42,50" fill="none" stroke="#8D6E63" stroke-width="1" opacity="0.6" />
  <path d="M60,60 L65,50 L70,55" fill="none" stroke="#8D6E63" stroke-width="1" opacity="0.6" />
  <path d="M30,55 L35,55 L38,60" fill="none" stroke="#8D6E63" stroke-width="1" opacity="0.6" />
  
  <!-- Texture Overlay (Simulated with simple shapes as noise filter support varies) -->
  <circle cx="30" cy="40" r="2" fill="#8D6E63" opacity="0.4" />
  <circle cx="70" cy="30" r="1.5" fill="#8D6E63" opacity="0.4" />
  <circle cx="50" cy="70" r="2.5" fill="#8D6E63" opacity="0.4" />
  <circle cx="60" cy="45" r="1" fill="#8D6E63" opacity="0.4" />
</svg>